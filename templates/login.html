{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="fas fa-graduation-cap" style="font-size: 3rem; color: var(--primary);"></i>
            <h3>Bienvenido a ENCL</h3>
            <p>Accede a tu plataforma educativa</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                    <input type="text" class="form-control" name="username" required placeholder="Ingresa tu usuario">
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                    <input type="password" class="form-control" name="password" required placeholder="Ingresa tu contraseña">
                </div>
            </div>
            <button type="submit" class="btn btn-auth mt-2"><i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión</button>
            <div class="text-center mt-3">
                <a href="{{ url_for('recuperar_paso1') }}" style="font-size: 0.85rem; color: var(--accent);">¿Olvidaste tu contraseña?</a>
            </div>
        </form>
        <div class="text-center mt-4">
            <p class="mb-1" style="font-size: 0.85rem;">¿No tienes cuenta? <a href="{{ url_for('public_registro') }}" style="color: var(--accent); font-weight: 600;">Regístrate aquí</a></p>
            <div class="mt-3 pt-3" style="border-top: 1px solid var(--gray-200);">
                <small class="text-muted">Accesos de demostración:</small>
                <div class="mt-2" style="font-size: 0.8rem;">
                    <span class="badge bg-primary me-1">Admin</span> admin / admin123
                    <span class="badge bg-success me-1 ms-2">Alumno</span> alumno1 / alumno123
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
