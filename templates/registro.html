{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="/uploads/logo_clean.svg" alt="ENCL" style="width: 120px; height: auto; margin-bottom: 0.5rem;">
            <h3>Crear cuenta</h3>
            <p>Únete a la comunidad educativa ENCL</p>
        </div>
        <form method="POST">
            <div class="row g-3">
                <div class="col-md-6">
                    <label class="form-label">Nombre</label>
                    <input type="text" class="form-control" name="nombre" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Apellidos</label>
                    <input type="text" class="form-control" name="apellidos" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Usuario</label>
                    <input type="text" class="form-control" name="username" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
                <div class="col-12">
                    <label class="form-label">Contraseña</label>
                    <input type="password" class="form-control" name="password" required minlength="6">
                </div>
            </div>
            <button type="submit" class="btn btn-auth mt-3"><i class="fas fa-user-plus me-2"></i>Crear cuenta</button>
        </form>
        <div class="text-center mt-3">
            <p style="font-size: 0.85rem;">¿Ya tienes cuenta? <a href="{{ url_for('public_login') }}" style="color: var(--accent); font-weight: 600;">Inicia sesión</a></p>
        </div>
    </div>
</div>
{% endblock %}
