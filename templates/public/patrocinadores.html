{% extends 'base.html' %}
{% block content %}
<div class="about-hero">
    <div class="container">
        <h1>Patrocinadores</h1>
        <p>Aliados estratégicos comprometidos con la educación de México</p>
    </div>
</div>

<section style="padding: 60px 0;">
    <div class="container">
        <div class="row g-4 justify-content-center">
            {% for pat in patrocinadores %}
            <div class="col-lg-3 col-md-4 col-6 animate-on-scroll">
                <div class="sponsor-card" style="background: #fff; border-radius: var(--radius-md); padding: 2rem; border: 1px solid var(--gray-200); height: 100%;">
                    <div class="sponsor-logo">
                        {% if pat.logo %}<img src="{{ pat.logo }}" style="width: 100%; height: 80px; object-fit: contain;" alt="{{ pat.nombre }}">{% else %}<i class="fas fa-handshake"></i>{% endif %}
                    </div>
                    <h6>{{ pat.nombre }}</h6>
                    <p style="font-size: 0.85rem;">{{ pat.cargo }}</p>
                    <p style="font-size: 0.8rem; font-style: italic; color: var(--gray-600);">"{{ pat.lema }}"</p>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
{% endblock %}
