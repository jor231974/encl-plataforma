<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.meta_titulo or (page.nombre + ' - ENCL Territorial') }}</title>
    <meta name="description" content="{{ page.meta_descripcion or '' }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        .tp-bg {
            position: fixed;
            inset: 0;
            z-index: -1;
            background: url('{{ page.foto or "/uploads/sergio perez.jpeg" }}') no-repeat;
            background-position: {{ page.bg_offset_x or 50 }}% {{ page.bg_offset_y or 50 }}%;
            background-size: {{ page.bg_zoom or 100 }}% auto;
            background-color: {{ page.color_primario or '#021a48' }};
        }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 2rem;
            position: relative;
        }
        .tp-access-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 1.5rem;
            width: 100%;
            max-width: 290px;
            margin-top: 18vh;
            margin-right: 1rem;
            margin-bottom: 1.5rem;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .tp-access-card h3 {
            font-size: 1.05rem;
            font-weight: 800;
            color: {{ page.color_primario or '#021a48' }};
            margin-bottom: 1rem;
            text-align: center;
        }
        .tp-input {
            border: 2px solid #e5e7eb;
            border-radius: 9px;
            padding: 0.5rem 0.85rem;
            font-size: 0.82rem;
            width: 100%;
            transition: border-color 0.3s;
        }
        .tp-input:focus {
            border-color: {{ page.color_secundario or '#f4a807' }};
            box-shadow: 0 0 0 3px rgba(244,168,7,0.15);
            outline: none;
        }
        .tp-btn-primary {
            width: 100%;
            background: {{ page.color_primario or '#021a48' }} !important;
            color: #fff !important;
            border: none !important;
            padding: 0.5rem 1rem;
            border-radius: 9px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .tp-btn-primary:hover {
            background: #0a2a6a !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(2,26,72,0.3);
        }
        .tp-access-links {
            display: flex;
            justify-content: space-between;
            margin-top: 0.65rem;
        }
        .tp-access-links a {
            color: {{ page.color_primario or '#021a48' }};
            font-size: 0.72rem;
            font-weight: 600;
            text-decoration: none;
        }
        .tp-access-links a:hover { color: {{ page.color_secundario or '#f4a807' }}; }
        @media (max-width: 992px) {
            .tp-access-card { max-width: 270px; margin-top: 14vh; }
        }
        @media (max-width: 768px) {
            body {
                justify-content: center;
                align-items: flex-end;
                padding: 1rem;
            }
            .tp-bg {
                background-position: {{ page.bg_offset_x or 50 }}% {{ page.bg_offset_y or 50 }}%;
                background-size: {{ page.bg_zoom or 100 }}% auto;
                background-color: {{ page.color_primario or '#021a48' }};
            }
            .tp-access-card {
                max-width: 100%;
                padding: 1rem;
                margin-top: 0;
                margin-right: 0;
                margin-bottom: 1rem;
            }
            .tp-access-card h3 { font-size: 0.95rem; }
            .tp-input { padding: 0.5rem 0.75rem; font-size: 0.8rem; }
            .tp-btn-primary { padding: 0.5rem 0.9rem; font-size: 0.82rem; }
        }
        @media (max-width: 480px) {
            body { padding: 0.5rem; }
            .tp-bg { background-size: contain; background-color: {{ page.color_primario or '#021a48' }}; }
            .tp-access-card { padding: 0.85rem; border-radius: 11px; }
            .tp-access-links { flex-direction: column; gap: 0.35rem; align-items: center; }
        }
    </style>
</head>
<body>
    <div class="tp-bg"></div>
    <div class="tp-access-card">
        <h3><i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión</h3>
        <form action="{{ url_for('public_login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label" style="font-weight:600;font-size:0.9rem;">Usuario o correo</label>
                <input type="text" class="tp-input" name="username" placeholder="Ingresa tu usuario o correo" required>
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-weight:600;font-size:0.9rem;">Contraseña</label>
                <input type="password" class="tp-input" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="tp-btn-primary"><i class="fas fa-arrow-right me-2"></i>Iniciar sesión</button>
        </form>
        <div class="tp-access-links">
            <a href="{{ url_for('public_registro') }}"><i class="fas fa-user-plus me-1"></i>Registrarme</a>
            <a href="{{ url_for('public_login') }}"><i class="fas fa-key me-1"></i>Recuperar contraseña</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
