<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.meta_titulo or (page.nombre + ' - ENCL Territorial') }}</title>
    <meta name="description" content="{{ page.meta_descripcion or '' }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: url('{{ page.foto or "/uploads/sergio perez.jpeg" }}') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding: 2rem;
        }
        .tp-access-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.2);
        }
        .tp-access-card h3 {
            font-size: 1.4rem;
            font-weight: 800;
            color: {{ page.color_primario or '#021a48' }};
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .tp-input {
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            font-size: 0.95rem;
            width: 100%;
            transition: border-color 0.3s;
        }
        .tp-input:focus {
            border-color: {{ page.color_secundario or '#f4a807' }};
            box-shadow: 0 0 0 3px rgba(244,168,7,0.15);
            outline: none;
        }
        .tp-btn-primary {
            width: 100%;
            background: {{ page.color_primario or '#021a48' }} !important;
            color: #fff !important;
            border: none !important;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            font-weight: 700;
            font-size: 1rem;
            transition: all 0.3s;
            cursor: pointer;
        }
        .tp-btn-primary:hover {
            background: #0a2a6a !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(2,26,72,0.3);
        }
        .tp-access-links {
            display: flex;
            justify-content: space-between;
            margin-top: 1rem;
        }
        .tp-access-links a {
            color: {{ page.color_primario or '#021a48' }};
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
        }
        .tp-access-links a:hover { color: {{ page.color_secundario or '#f4a807' }}; }
        @media (max-width: 768px) {
            body { justify-content: center; padding: 1rem; }
            .tp-access-card { max-width: 100%; padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="tp-access-card">
        <h3><i class="fas fa-sign-in-alt me-2"></i>Iniciar sesión</h3>
        <form action="{{ url_for('public_login') }}" method="POST">
            <div class="mb-3">
                <label class="form-label" style="font-weight:600;font-size:0.9rem;">Usuario o correo</label>
                <input type="text" class="tp-input" name="username" placeholder="Ingresa tu usuario o correo" required>
            </div>
            <div class="mb-3">
                <label class="form-label" style="font-weight:600;font-size:0.9rem;">Contraseña</label>
                <input type="password" class="tp-input" name="password" placeholder="Ingresa tu contraseña" required>
            </div>
            <button type="submit" class="tp-btn-primary"><i class="fas fa-arrow-right me-2"></i>Iniciar sesión</button>
        </form>
        <div class="tp-access-links">
            <a href="{{ url_for('public_registro') }}"><i class="fas fa-user-plus me-1"></i>Registrarme</a>
            <a href="{{ url_for('public_login') }}"><i class="fas fa-key me-1"></i>Recuperar contraseña</a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
