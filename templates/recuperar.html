{% extends 'base.html' %}
{% block content %}
<div class="auth-page">
    <div class="auth-card">
        <div class="auth-logo">
            <img src="/uploads/logo_clean.svg" alt="ENCL" style="width:120px;height:auto;margin-bottom:0.5rem;">
            <h3>Recuperar contraseña</h3>
            <p style="font-size:0.9rem;color:var(--gray-600);">Ingresa tu usuario o correo electrónico</p>
        </div>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Usuario</label>
                <input type="text" class="form-control" name="username" placeholder="Tu nombre de usuario">
            </div>
            <div class="text-center mb-2" style="font-size:0.85rem;color:var(--gray-500);">— o —</div>
            <div class="mb-3">
                <label class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" name="email" placeholder="tu@correo.com">
            </div>
            <button type="submit" class="btn btn-auth mt-2 w-100"><i class="fas fa-search me-2"></i>Buscar cuenta</button>
        </form>
        <div class="text-center mt-3">
            <a href="{{ url_for('public_login') }}" style="font-size:0.85rem;color:var(--primary);">Volver a inicio de sesión</a>
        </div>
    </div>
</div>
{% endblock %}
